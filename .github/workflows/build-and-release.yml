name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            executable_name: tsnf_pro_linux
          - os: windows-latest
            executable_name: tsnf_pro.exe
          - os: macos-latest
            executable_name: tsnf_pro_macos

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller rich

    - name: Build executable
      run: |
        pyinstaller --onefile tsnf_pro.py

    - name: Rename executable (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: mv dist/tsnf_pro dist/${{ matrix.executable_name }}

    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/${{ matrix.executable_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
